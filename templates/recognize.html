<!DOCTYPE html>
<html>
<head>
    <title>Face Recognition</title>
</head>
<body>
    <style>
       *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Tahoma, sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg,#000000,#0f2027,#203a43);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:#ffffff;
    text-align:center;
    padding:20px;
}

/* Heading */
h2{
    font-size:32px;
    margin-bottom:20px;
    letter-spacing:1px;
    text-shadow:0 4px 12px rgba(0,0,0,0.8);
}

/* Camera feed */
img{
    width:100%;
    max-width:640px;
    border-radius:18px;
    border:3px solid rgba(255,255,255,0.25);
    box-shadow:0 18px 40px rgba(0,0,0,0.8);
    margin-bottom:25px;
}

/* Info text */
p{
    font-size:17px;
    line-height:1.8;
    margin-bottom:30px;
    color:#e0f7ff;
}

/* Back link styled as button */
a{
    display:inline-block;
    padding:14px 36px;
    border-radius:40px;
    background: linear-gradient(135deg,#00f2fe,#4facfe);
    color:#000;
    text-decoration:none;
    font-weight:600;
    font-size:16px;
    box-shadow:0 10px 30px rgba(79,172,254,0.6);
    transition:all 0.35s ease;
}

a:hover{
    transform: translateY(-4px);
    box-shadow:0 18px 45px rgba(79,172,254,0.9);
}

a:active{
    transform: scale(0.95);
}

/* Mobile */
@media(max-width:600px){
    h2{
        font-size:24px;
    }
    p{
        font-size:14px;
    }
}

    </style>
<h2>Student Face Recognition</h2>

<img src="/video_feed" width="640">

<p>
As soon as the face is recognized:<br>
✔ Attendance will be marked automatically<br>
</p>
<a href="/">Back</a>



</body>
</html>
