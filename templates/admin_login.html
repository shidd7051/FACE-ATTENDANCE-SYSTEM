<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}

/* Login Card */
form{
    width:340px;
    background: rgba(255,255,255,0.08);
    padding:35px 30px;
    border-radius:18px;
    text-align:center;
    backdrop-filter: blur(12px);
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.15);
}

/* Heading */
form h2{
    margin-bottom:25px;
    font-size:26px;
    letter-spacing:1px;
}

/* Inputs */
input{
    width:100%;
    padding:14px;
    margin:14px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.25);
    background: rgba(0,0,0,0.4);
    color:#fff;
    font-size:15px;
    outline:none;
}

input::placeholder{
    color:#cfd8dc;
}

/* Input focus */
input:focus{
    border-color:#4facfe;
    box-shadow:0 0 10px rgba(79,172,254,0.6);
}

/* Button */
button{
    margin-top:20px;
    width:100%;
    padding:14px;
    border-radius:40px;
    border:none;
    background: linear-gradient(90deg,#00f2fe,#4facfe);
    color:#000;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s ease;
}

button:hover{
    transform: translateY(-2px);
    box-shadow:0 12px 25px rgba(79,172,254,0.7);
}

/* Error message */
.err{
    margin-bottom:10px;
    color:#ff6b6b;
    font-size:14px;
}
input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border-radius:6px;
    border:none;
    outline:none;
}

button{
    padding:12px;
    width:100%;
    background:#0ef;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#00d4e6;
}

    </style>
</head>
<body>

<form method="POST">
    <h2>Admin Login</h2>

    {% if error %}
      <p class="err">{{ error }}</p>
    {% endif %}

    <input type="text" name="username" placeholder="Admin Username" required>
    <input type="password" name="password" placeholder="Admin Password" required>

    <button type="submit">Login</button>
</form>

</body>
</html>
