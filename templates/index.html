<!DOCTYPE html>
<html>
<head>
<title>Face Attendance</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* Main box */
.container{
    background:#111;
    padding:40px 50px;
    border-radius:12px;
    text-align:center;
    width:90%;
    max-width:500px;
    border:2px solid #0ef;
    box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

/* Heading */
h1{
    font-size:26px;
    margin-bottom:30px;
    letter-spacing:1px;
}

/* Menu */
.menu{
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* Buttons */
.menu a{
    padding:14px;
    background:#0ef;
    color:#000;
    text-decoration:none;
    border-radius:8px;
    font-size:16px;
    font-weight:600;
    transition:0.3s ease;
}

/* Hover effect (simple) */
.menu a:hover{
    background:#6326fd;
}

/* Mobile */
@media(max-width:500px){
    h1{
        font-size:22px;
    }
}
</style>

</head>
<body>

<div class="container">
    <h1>FACE ATTENDANCE SYSTEM</h1>

    <div class="menu">
        <a href="/admin_login">Student Register</a>

        <a href="/recognize">Face Recognition</a>
        <a href="/attendance">Attendance</a>
    </div>
</div>

</body>
</html>
